<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>성경 ox 퀴즈</title>
  <style>
    @font-face {
      font-family: "DeterminationMonoK2";
      src: url("DeterminationMonoK2.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      color-scheme: dark;
      --floor: #141512;
      --floor-line: rgba(255, 255, 255, 0.06);
      --edge: rgba(255, 255, 255, 0.14);
      --panel: rgba(10, 12, 10, 0.86);
      --panel-strong: rgba(0, 0, 0, 0.72);
      --text: #ffffff;
      --muted: #c8cec2;
      --accent: #f1d15d;
      --danger: #f06060;
      --blue: #5ca9ff;
      --green: #78d372;
      --sprite-size: clamp(78px, 8vw, 116px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #080908;
      color: var(--text);
      font-family: "DeterminationMonoK2", system-ui, sans-serif;
      letter-spacing: 0;
    }

    body.screen-mode {
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    .hidden {
      display: none !important;
    }

    .landing-page,
    .screen-page {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .landing-page {
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        radial-gradient(circle at 50% 28%, #24271f, #080908 70%);
      background-size: 46px 46px, 46px 46px, 100% 100%;
    }

    .landing-panel {
      width: min(100%, 560px);
      border: 1px solid var(--edge);
      border-radius: 8px;
      background: var(--panel-strong);
      padding: clamp(20px, 4vw, 34px);
      box-shadow: 0 24px 54px rgba(0, 0, 0, 0.36);
      text-align: center;
    }

    .landing-title {
      margin: 0 0 12px;
      font-size: clamp(42px, 9vw, 82px);
      font-weight: 400;
      line-height: 1;
      text-shadow: 0 5px 0 #000000;
    }

    .landing-copy {
      margin: 0 0 22px;
      color: var(--muted);
      font-family: system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.45;
    }

    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mode-button {
      display: grid;
      place-items: center;
      min-height: 74px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
      font-size: clamp(24px, 5vw, 36px);
      text-decoration: none;
    }

    .mode-button.screen-choice {
      background: rgba(92, 169, 255, 0.18);
    }

    .mode-button.player-choice {
      background: rgba(120, 211, 114, 0.18);
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      outline: none;
      background:
        linear-gradient(var(--floor-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--floor-line) 1px, transparent 1px),
        radial-gradient(circle at 50% 42%, #25281e 0%, var(--floor) 58%, #0b0c0a 100%);
      background-size: 48px 48px, 48px 48px, 100% 100%;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0 50% 0 0;
      background: linear-gradient(90deg, rgba(72, 155, 255, 0.16), rgba(72, 155, 255, 0.02));
      pointer-events: none;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0 0 0 50%;
      background: linear-gradient(90deg, rgba(255, 210, 78, 0.02), rgba(255, 210, 78, 0.16));
      pointer-events: none;
    }

    .divider {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      z-index: 1;
      width: 4px;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.7) 0 18px,
        rgba(255, 255, 255, 0.14) 18px 34px
      );
      transform: translateX(-50%);
      pointer-events: none;
    }

    .zone-label {
      position: absolute;
      top: 50%;
      z-index: 1;
      font-size: clamp(150px, 28vw, 390px);
      line-height: 1;
      opacity: 0.12;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .zone-o {
      left: 10vw;
      color: var(--blue);
    }

    .zone-x {
      right: 10vw;
      color: var(--accent);
    }

    .title {
      position: absolute;
      left: 50%;
      top: clamp(18px, 4vh, 42px);
      z-index: 4;
      margin: 0;
      color: #ffffff;
      font-size: clamp(34px, 5.4vw, 78px);
      font-weight: 400;
      line-height: 1;
      text-align: center;
      text-shadow: 0 5px 0 #000000;
      transform: translateX(-50%);
      white-space: nowrap;
      pointer-events: none;
    }

    .question-board {
      position: absolute;
      left: 50%;
      top: clamp(82px, 12vh, 118px);
      z-index: 4;
      display: grid;
      gap: 8px;
      justify-items: center;
      width: min(86vw, 980px);
      transform: translateX(-50%);
      pointer-events: none;
    }

    .question-text,
    .round-message {
      margin: 0;
      padding: 8px 16px 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.58);
      text-align: center;
      text-shadow: 0 3px 0 #000000;
    }

    .question-text {
      max-width: 100%;
      color: #ffffff;
      font-size: clamp(20px, 3vw, 42px);
      line-height: 1.14;
    }

    .round-message {
      color: var(--accent);
      font-size: clamp(18px, 2.4vw, 34px);
      line-height: 1;
    }

    .players-layer {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    .avatar {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--sprite-size);
      transform: translate3d(-999px, -999px, 0);
      will-change: transform;
      pointer-events: none;
    }

    .avatar-name,
    .avatar-hearts {
      position: absolute;
      left: 50%;
      display: flex;
      justify-content: center;
      width: max-content;
      max-width: 180px;
      transform: translateX(-50%);
      text-align: center;
      text-shadow: 0 3px 0 #000000;
      pointer-events: none;
    }

    .avatar-name {
      bottom: calc(100% + 2px);
      padding: 2px 7px 3px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.54);
      font-size: clamp(15px, 1.8vw, 22px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .avatar-hearts {
      top: calc(100% - 8px);
      gap: 3px;
    }

    .heart {
      width: clamp(18px, 2vw, 28px);
      height: clamp(18px, 2vw, 28px);
      image-rendering: pixelated;
      object-fit: contain;
    }

    .avatar canvas,
    .preview canvas {
      width: 100%;
      aspect-ratio: 1;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .room-panel,
    .host-panel {
      position: absolute;
      z-index: 5;
      border: 1px solid var(--edge);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
    }

    .room-panel {
      right: clamp(14px, 2vw, 28px);
      top: clamp(190px, 25vh, 240px);
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 12px;
      align-items: center;
      width: min(420px, calc(100vw - 28px));
      padding: 12px;
    }

    .qr {
      width: 112px;
      height: 112px;
      border: 6px solid #ffffff;
      background: #ffffff;
    }

    .room-info {
      min-width: 0;
    }

    .room-kicker {
      color: var(--muted);
      font-size: 17px;
    }

    .room-code {
      margin-top: 4px;
      color: var(--accent);
      font-size: clamp(34px, 4vw, 56px);
      line-height: 0.92;
    }

    .room-link,
    .status {
      margin-top: 6px;
      color: var(--muted);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      line-height: 1.35;
      word-break: break-all;
    }

    .status.warning {
      color: #ffdc7a;
    }

    .host-panel {
      left: clamp(14px, 2vw, 28px);
      bottom: clamp(14px, 2vw, 28px);
      width: min(430px, calc(100vw - 28px));
      max-height: min(42vh, 360px);
      padding: 12px;
      overflow: auto;
    }

    .host-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 18px;
    }

    .player-list {
      display: grid;
      gap: 8px;
    }

    .player-card {
      display: grid;
      grid-template-columns: 20px 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
    }

    .swatch {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
    }

    .card-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-hearts {
      display: flex;
      gap: 2px;
    }

    .mini-hearts img {
      width: 20px;
      height: 20px;
      image-rendering: pixelated;
      object-fit: contain;
    }

    .wrong-button,
    .reset-button,
    .start-button,
    .step-button,
    .go-button,
    .random-button {
      min-width: 54px;
      padding: 7px 8px;
      border-radius: 5px;
      background: rgba(240, 96, 96, 0.18);
    }

    .reset-button,
    .step-button,
    .random-button {
      min-width: auto;
      background: rgba(255, 255, 255, 0.08);
    }

    .start-button {
      background: rgba(120, 211, 114, 0.24);
    }

    .empty {
      padding: 14px 8px 8px;
      color: var(--muted);
      text-align: center;
    }

    .player-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px),
        radial-gradient(circle at 50% 20%, #22241d, #090a08 68%);
      background-size: 42px 42px, 42px 42px, 100% 100%;
    }

    .phone-panel {
      width: min(100%, 430px);
      border: 1px solid var(--edge);
      border-radius: 8px;
      background: var(--panel-strong);
      padding: 18px;
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.32);
    }

    .phone-title {
      margin: 0 0 16px;
      font-size: clamp(34px, 9vw, 56px);
      font-weight: 400;
      line-height: 1;
      text-align: center;
      text-shadow: 0 4px 0 #000000;
    }

    .join-form,
    .player-controls {
      display: grid;
      gap: 12px;
    }

    .player-controls {
      padding-bottom: 280px;
    }

    .join-step {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 17px;
    }

    .field input {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 6px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
      padding: 10px 12px;
      font-family: system-ui, sans-serif;
      font-size: 18px;
    }

    .field input[type="color"] {
      height: 52px;
      padding: 5px;
    }

    .primary-button {
      min-height: 50px;
      border-radius: 6px;
      background: rgba(120, 211, 114, 0.24);
      font-size: 22px;
    }

    .step-button,
    .go-button,
    .random-button {
      min-height: 48px;
      font-size: 21px;
    }

    .go-button {
      background: rgba(120, 211, 114, 0.26);
    }

    .preview {
      display: grid;
      justify-items: center;
      gap: 2px;
      margin: 2px 0 12px;
    }

    .preview-name {
      min-height: 28px;
      padding: 2px 8px 3px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.45);
      font-size: 20px;
      text-shadow: 0 3px 0 #000000;
    }

    .preview-sprite {
      width: 120px;
      height: 120px;
    }

    .preview-hearts {
      display: flex;
      gap: 4px;
    }

    .preview-hearts img {
      width: 30px;
      height: 30px;
      image-rendering: pixelated;
      object-fit: contain;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .color-swatch-button {
      aspect-ratio: 1;
      min-width: 0;
      border-radius: 6px;
      border: 2px solid rgba(255, 255, 255, 0.22);
      background: var(--swatch);
    }

    .color-swatch-button.selected {
      border-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(241, 209, 93, 0.9);
    }

    .color-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .pad {
      display: grid;
      grid-template-columns: repeat(3, minmax(70px, 1fr));
      gap: 8px;
      touch-action: none;
      user-select: none;
    }

    .pad-button {
      aspect-ratio: 1;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      font-family: system-ui, sans-serif;
      font-size: 34px;
      line-height: 1;
    }

    .pad-button[data-center="true"] {
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      pointer-events: none;
    }

    .pad-button.active {
      background: rgba(241, 209, 93, 0.28);
      box-shadow: inset 0 0 0 2px rgba(241, 209, 93, 0.45);
    }

    .mobile-console {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      display: grid;
      gap: 10px;
      width: min(430px, calc(100vw - 32px));
      margin-top: 10px;
      margin-left: auto;
      margin-right: auto;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
    }

    .console-label {
      color: var(--muted);
      font-size: 17px;
      text-align: center;
    }

    @media (max-width: 760px) {
      body.screen-mode {
        overflow: auto;
      }

      .room-panel {
        grid-template-columns: 88px 1fr;
      }

      .qr {
        width: 88px;
        height: 88px;
      }

      .host-panel {
        max-height: 30vh;
      }

      .mode-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section class="landing-page" id="landingPage">
    <main class="landing-panel">
      <h1 class="landing-title">성경 ox 퀴즈</h1>
      <p class="landing-copy">큰 화면은 스크린으로 열고, 휴대폰은 플레이어로 입장하세요.</p>
      <div class="mode-buttons">
        <a class="mode-button screen-choice" href="?screen=1">스크린</a>
        <a class="mode-button player-choice" href="?player=1">플레이어</a>
      </div>
    </main>
  </section>

  <section class="screen-page hidden" id="screenPage">
    <main class="stage" id="stage" tabindex="0" aria-label="성경 ox 퀴즈 화면">
      <h1 class="title">성경 ox 퀴즈</h1>
      <section class="question-board" aria-live="polite">
        <h2 class="question-text" id="questionText">잠시 후 문제가 시작됩니다.</h2>
        <p class="round-message" id="roundMessage">대기 중</p>
      </section>
      <div class="zone-label zone-o">O</div>
      <div class="zone-label zone-x">X</div>
      <div class="divider"></div>
      <div class="players-layer" id="playersLayer"></div>

      <aside class="room-panel" aria-label="방 입장 정보">
        <img class="qr" id="qrImage" alt="방 QR 코드">
        <div class="room-info">
          <div class="room-kicker">방 코드</div>
          <div class="room-code" id="screenRoomCode">----</div>
          <div class="room-link" id="roomLink"></div>
          <div class="status" id="screenStatus"></div>
        </div>
      </aside>

      <aside class="host-panel" aria-label="플레이어 관리">
        <div class="host-head">
          <span>플레이어</span>
          <button class="start-button" id="startGameButton" type="button">게임 시작</button>
          <button class="reset-button" id="resetRoomButton" type="button">초기화</button>
        </div>
        <div class="player-list" id="playerList"></div>
      </aside>
    </main>
  </section>

  <section class="player-page hidden" id="playerPage">
    <main class="phone-panel">
      <h1 class="phone-title">성경 ox 퀴즈</h1>

      <form class="join-form" id="joinForm">
        <section class="join-step" id="roomStep">
          <label class="field">
            방 코드
            <input id="roomCodeInput" autocomplete="off" maxlength="6" placeholder="ABCD" required>
          </label>
          <button class="step-button" id="roomConfirmButton" type="button">확인</button>
        </section>

        <section class="join-step hidden" id="nicknameStep">
          <label class="field">
            닉네임
            <input id="nicknameInput" autocomplete="off" maxlength="8" placeholder="1~8자" required>
          </label>
          <button class="step-button" id="nicknameConfirmButton" type="button">확인</button>
        </section>

        <section class="join-step hidden" id="colorStep">
          <div class="preview" aria-label="캐릭터 미리보기">
            <div class="preview-name" id="previewName">플레이어</div>
            <canvas class="preview-sprite" id="previewCanvas" width="128" height="128"></canvas>
            <div class="preview-hearts" id="previewHearts"></div>
          </div>
          <div class="field">
            캐릭터 색상
            <div class="color-grid" id="colorGrid"></div>
          </div>
          <div class="color-actions">
            <button class="random-button" id="randomColorButton" type="button">랜덤 색상</button>
            <button class="go-button" id="goButton" type="button">GO!!</button>
          </div>
        </section>
        <div class="status" id="joinStatus"></div>
      </form>

      <section class="player-controls hidden" id="playerControls">
        <div class="preview" aria-label="내 캐릭터">
          <div class="preview-name" id="livePreviewName">플레이어</div>
          <canvas class="preview-sprite" id="livePreviewCanvas" width="128" height="128"></canvas>
          <div class="preview-hearts" id="livePreviewHearts"></div>
        </div>

        <div class="mobile-console">
          <div class="console-label">이동 콘솔</div>
          <div class="pad" id="movePad" aria-label="이동 패드">
            <button class="pad-button" data-keys="w a" type="button">↖</button>
            <button class="pad-button" data-keys="w" type="button">↑</button>
            <button class="pad-button" data-keys="w d" type="button">↗</button>
            <button class="pad-button" data-keys="a" type="button">←</button>
            <button class="pad-button" data-center="true" type="button">•</button>
            <button class="pad-button" data-keys="d" type="button">→</button>
            <button class="pad-button" data-keys="s a" type="button">↙</button>
            <button class="pad-button" data-keys="s" type="button">↓</button>
            <button class="pad-button" data-keys="s d" type="button">↘</button>
          </div>
        </div>
        <div class="status" id="playerStatus"></div>
      </section>
    </main>
  </section>

  <script type="module">
    const firebaseConfig = {

    const questionBanks = {
      low: [
        ["하나님은 세상을 7일 동안 창조하셨다.", "X"],

        ["다윗은 골리앗과 싸웠다.", "O"],
        ["예수님은 베들레헴에서 태어나셨다.", "O"],

    async function connectFirebase() {
      if (!firebaseConfig.apiKey || !firebaseConfig.databaseURL || !firebaseConfig.projectId) {
        return null;
      }

      try {
        const appModule = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
        const dbModule = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js");
        const app = appModule.initializeApp(firebaseConfig);
        return {
          db: dbModule.getDatabase(app),
          ref: dbModule.ref,
          set: dbModule.set,
          update: dbModule.update,
          onValue: dbModule.onValue,
          onDisconnect: dbModule.onDisconnect,
          remove: dbModule.remove,
          serverTimestamp: dbModule.serverTimestamp
        };
      } catch (error) {
        console.error(error);
        return null;
      }
    }

    async function ensureFirebase(timeoutMs = 12000) {
      if (firebaseReady && firebase && db) {
        return true;
      }

      if (!firebaseConnectPromise) {
        firebaseConnectPromise = connectFirebase();
      }

      const result = await withTimeout(firebaseConnectPromise, timeoutMs);
      if (!result) {
        firebaseConnectPromise = null;
        return false;
      }

      firebase = result;
      db = firebase.db;
      firebaseReady = true;
      return true;
    }

    function withTimeout(promise, timeoutMs) {
      return Promise.race([
        promise,
        new Promise((resolve) => {
          setTimeout(() => resolve(null), timeoutMs);
        })
      ]);
    }

    async function setupScreen() {
      await ensureFirebase(12000);

      screenRoomCode.textContent = roomCode;

      startGameButton.addEventListener("click", startGame);
      resetRoomButton.addEventListener("click", resetRoom);
      requestAnimationFrame(updateScreen);

      if (!firebaseReady) {
        screenStatus.textContent = "Firebase 설정 필요";
        screenStatus.classList.add("warning");
        renderPlayerList();
        return;
      }

      activeRoomRef = firebase.ref(db, `rooms/${roomCode}`);
      playersRef = firebase.ref(db, `rooms/${roomCode}/players`);
      firebase.update(activeRoomRef, {
        code: roomCode,
        updatedAt: Date.now()
      }).catch(console.warn);

      firebase.onValue(playersRef, (snapshot) => {
        latestPlayers = snapshot.val() || {};
        syncLocalPlayers();
        renderPlayerList();
      });

      screenStatus.textContent = "온라인";
    }

    function startGame() {
      if (gameStarted) return;
      gameStarted = true;
      startGameButton.disabled = true;
      startGameButton.textContent = "진행 중";

    function startQuizLoop() {
      clearTimeout(quizTimer);
      clearInterval(countdownTimer);
      showNextQuestion();
    }

    function showNextQuestion() {
      currentQuestion = drawQuestion();
      movementEnabled = false;
      questionText.textContent = currentQuestion.text;
      roundMessage.textContent = "준비";
      quizTimer = setTimeout(beginMovePhase, 500);
    }

    function beginMovePhase() {
      movementEnabled = true;
      let secondsLeft = moveSeconds;
      updateCountdown(secondsLeft);

      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        secondsLeft -= 1;
        updateCountdown(secondsLeft);

        if (secondsLeft <= 0) {
          clearInterval(countdownTimer);
          showAnswerNotice();
        }
      }, 1000);
    }

    function updateCountdown(secondsLeft) {
      roundMessage.textContent = `이동하세요!! (${Math.max(0, secondsLeft)}초)`;
    }

    function showAnswerNotice() {
      movementEnabled = false;
      roundMessage.textContent = "정답 공개";
      quizTimer = setTimeout(revealAnswer, 500);
    }

    function revealAnswer() {
      roundMessage.textContent = `정답은....${currentQuestion.answer}!!!!`;
      evaluateAnswers();

      quizTimer = setTimeout(() => {
        roundMessage.textContent = "결과 확인";

        quizTimer = setTimeout(() => {
          roundMessage.textContent = "다음 문제";
          quizTimer = setTimeout(showNextQuestion, 800);
        }, answerDuration);
      }, 1000);
    }

    function drawQuestion() {
      if (cycleDeck.length === 0) {
        cycleDeck = [
          ...shuffle(questionBanks.low).slice(0, 7),
          randomItem(questionBanks.high),
          randomItem(questionBanks.highest)
        ].map(([text, answer]) => ({ text, answer }));
      }

      return cycleDeck.shift();
    }

    function evaluateAnswers() {
      if (!currentQuestion) return;

      const bounds = stage.getBoundingClientRect();
      const half = bounds.width / 2;
      const now = performance.now();
      const updates = {};

      for (const [id, state] of localPlayers) {
        const player = latestPlayers[id];
        if (!player) continue;

        const centerX = state.x + getSpriteSize() / 2;
        const choice = centerX < half ? "O" : "X";
        const isCorrect = choice === currentQuestion.answer;

        state.effect = isCorrect ? "correct" : "wrong";
        state.effectStartedAt = now;
        state.effectUntil = now + answerDuration;

        if (!isCorrect) {
          const lives = clamp(Number(player.lives ?? maxLives) - 1, 0, maxLives);
          player.lives = lives;
          updates[`rooms/${roomCode}/players/${id}/lives`] = lives;
        }
      }

      if (firebaseReady && Object.keys(updates).length > 0) {
        firebase.update(firebase.ref(db), updates);
      }

      renderPlayerList();
    }

    function buildColorGrid() {
      colorGrid.replaceChildren(
        ...colorChoices.map((color) => {
          const button = document.createElement("button");
          button.className = "color-swatch-button";
          button.type = "button";
          button.style.setProperty("--swatch", color);
          button.setAttribute("aria-label", color);
          button.addEventListener("click", () => selectColor(color));
          return button;
        })
      );
      selectColor(selectedColor);

      selectedColor = color;

      goButton.disabled = false;

      if (!ready) {
        joinStatus.textContent = "서버 연결에 실패했습니다. 인터넷 연결 후 GO를 다시 눌러주세요.";
        joinStatus.classList.add("warning");
        return;
      }

      roomCode = pendingRoomCode;
      const nickname = pendingNickname;
      const color = selectedColor;

      if (!roomCode || !nickname) {
        joinStatus.textContent = "입장 정보를 다시 확인해주세요.";
        return;
      }

      playerId = getPlayerId();
      playerRef = firebase.ref(db, `rooms/${roomCode}/players/${playerId}`);
      await firebase.set(playerRef, {
        nickname,
        color,
        lives: maxLives,
        keys: makeEmptyKeys(),
        xRatio: 0.5,
        yRatio: 0.55,
        joinedAt: Date.now(),
        lastSeen: Date.now(),
        connected: true
      });

      try {
        await firebase.onDisconnect(playerRef).remove();
      } catch (error) {
        console.warn(error);
      }

      joinForm.classList.add("hidden");
      playerControls.classList.remove("hidden");
      livePreviewName.textContent = nickname;
      playerStatus.textContent = `방 ${roomCode}`;
      paintSprite(livePreviewCanvas, idleFrame, color);
      renderHearts(livePreviewHearts, maxLives);
      setupPlayerControls();

      firebase.onValue(playerRef, (snapshot) => {
        const player = snapshot.val();
        if (!player) return;
        livePreviewName.textContent = player.nickname || nickname;
        renderHearts(livePreviewHearts, Number(player.lives ?? maxLives));
        paintSprite(livePreviewCanvas, idleFrame, player.color || color);
      });

      setInterval(() => {
        if (!playerRef) return;
        firebase.update(playerRef, { lastSeen: Date.now(), connected: true });
      }, 2500);
    }

    function setupPlayerControls() {
      movePad.querySelectorAll(".pad-button[data-keys]").forEach((button) => {
        const keys = button.dataset.keys.split(" ");

        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          button.setPointerCapture(event.pointerId);
          button.classList.add("active");
          activePadKeys.clear();
          keys.forEach((key) => activePadKeys.add(key));
          writeInput();
        });

        const clear = () => {
          button.classList.remove("active");
          activePadKeys.clear();
          writeInput();
        };

        button.addEventListener("pointerup", clear);
        button.addEventListener("pointercancel", clear);
        button.addEventListener("pointerleave", clear);
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (!allKeys.includes(key)) return;
        event.preventDefault();
        heldKeyboardKeys.add(key);
        writeInput();
      });

      window.addEventListener("keyup", (event) => {
        const key = event.key.toLowerCase();
        if (!allKeys.includes(key)) return;
        event.preventDefault();
        heldKeyboardKeys.delete(key);
        writeInput();
      });

      window.addEventListener("blur", () => {
        heldKeyboardKeys.clear();
        activePadKeys.clear();
        writeInput();
      });
    }

    async function writeInput() {
      if (!playerRef || !firebaseReady) return;
      const keys = makeEmptyKeys();
      for (const key of heldKeyboardKeys) keys[key] = true;
      for (const key of activePadKeys) keys[key] = true;
      await firebase.update(playerRef, { keys, lastSeen: Date.now(), connected: true });
    }

    function updateScreen(now) {
      const elapsed = Math.min((now - lastFrameAt) / 1000, 0.05);
      lastFrameAt = now;
      const bounds = stage.getBoundingClientRect();
      const spriteSize = getSpriteSize();

      for (const [id, state] of localPlayers) {
        const player = latestPlayers[id];
        if (!player) continue;

        const direction = movementEnabled ? getDirectionFromKeys(player.keys || {}) : "";
        if (direction !== state.direction) {
          state.direction = direction;
          state.directionStartedAt = now;
        }

        const vector = movementVector(direction);
        if (direction && movementEnabled) {
          state.x += vector.x * speed * elapsed;
          state.y += vector.y * speed * elapsed;
        }

        state.x = clamp(state.x, 0, Math.max(0, bounds.width - spriteSize));
        state.y = clamp(state.y, 0, Math.max(0, bounds.height - spriteSize));
        renderAvatar(id, player, state, now);
      }

      if (firebaseReady && now - lastStateWrite > writeInterval) {
        lastStateWrite = now;
        writePlayerPositions(bounds, spriteSize);
      }

      requestAnimationFrame(updateScreen);
    }

    function syncLocalPlayers() {
      const bounds = stage.getBoundingClientRect();
      const spriteSize = getSpriteSize();

      for (const id of avatarNodes.keys()) {
        if (!latestPlayers[id]) {
          avatarNodes.get(id).root.remove();
          avatarNodes.delete(id);
          localPlayers.delete(id);
        }
      }

      Object.entries(latestPlayers).forEach(([id, player]) => {
        if (!localPlayers.has(id)) {
          localPlayers.set(id, {
            x: clamp(Number(player.xRatio ?? 0.5) * Math.max(0, bounds.width - spriteSize), 0, Math.max(0, bounds.width - spriteSize)),
            y: clamp(Number(player.yRatio ?? 0.55) * Math.max(0, bounds.height - spriteSize), 0, Math.max(0, bounds.height - spriteSize)),
            direction: "",
            directionStartedAt: performance.now(),
            effect: "",
            effectStartedAt: 0,
            effectUntil: 0,
            lastFrame: "",
            lastColor: ""
          });
        }

        if (!avatarNodes.has(id)) {
          avatarNodes.set(id, createAvatarNode(player));
        }
      });
    }

    function createAvatarNode(player) {
      const root = document.createElement("div");
      root.className = "avatar";

      const name = document.createElement("div");
      name.className = "avatar-name";
      root.append(name);

      const canvas = document.createElement("canvas");
      canvas.width = 128;
      canvas.height = 128;
      root.append(canvas);

      const hearts = document.createElement("div");
      hearts.className = "avatar-hearts";
      root.append(hearts);

      playersLayer.append(root);
      name.textContent = player.nickname || "플레이어";
      renderHearts(hearts, Number(player.lives ?? maxLives));
      return { root, name, canvas, hearts };
    }

    function renderAvatar(id, player, state, now) {
      const node = avatarNodes.get(id);
      if (!node) return;

      const direction = state.direction;
      const frame = selectFrame(direction, state.directionStartedAt, now);
      const bob = direction
        ? (Math.floor((now - state.directionStartedAt) / bobDuration) % 2 === 0 ? -bobOffset : bobOffset)
        : 0;
      const effect = getEffectOffset(state, now);
      const color = player.color || "#ffffff";

      node.root.style.transform = `translate3d(${state.x + effect.x}px, ${state.y + bob + effect.y}px, 0)`;
      node.name.textContent = player.nickname || "플레이어";
      renderHearts(node.hearts, Number(player.lives ?? maxLives));

      if (state.lastFrame !== frame || state.lastColor !== color) {
        state.lastFrame = frame;
        state.lastColor = color;
        paintSprite(node.canvas, frame, color);
      }
    }

    function getEffectOffset(state, now) {
      if (!state.effect || now > state.effectUntil) {
        state.effect = "";
        return { x: 0, y: 0 };
      }

      const elapsed = now - state.effectStartedAt;
      if (state.effect === "correct") {
        return { x: 0, y: Math.floor(elapsed / 400) % 2 === 0 ? -6 : 0 };
      }

      if (state.effect === "wrong") {
        return { x: Math.floor(elapsed / 20) % 2 === 0 ? -1 : 1, y: 0 };
      }

      return { x: 0, y: 0 };
    }

    function renderPlayerList() {
      if (!latestPlayers || Object.keys(latestPlayers).length === 0) {
        playerList.innerHTML = '<div class="empty">입장 대기</div>';
        return;
      }

      playerList.replaceChildren(
        ...Object.entries(latestPlayers).map(([id, player]) => {
          const card = document.createElement("div");
          card.className = "player-card";

          const swatch = document.createElement("div");
          swatch.className = "swatch";
          swatch.style.background = player.color || "#ffffff";

          const name = document.createElement("div");
          name.className = "card-name";
          name.textContent = player.nickname || "플레이어";

          const hearts = document.createElement("div");
          hearts.className = "mini-hearts";
          renderHearts(hearts, Number(player.lives ?? maxLives));

          const button = document.createElement("button");
          button.className = "wrong-button";
          button.type = "button";
          button.textContent = "오답";
          button.addEventListener("click", () => loseHeart(id, player));

          card.append(swatch, name, hearts, button);
          return card;
        })
      );
    }

    async function loseHeart(id, player) {
      if (!firebaseReady) return;
      const lives = clamp(Number(player.lives ?? maxLives) - 1, 0, maxLives);
      await firebase.update(firebase.ref(db, `rooms/${roomCode}/players/${id}`), { lives });
    }

    async function resetRoom() {
      if (!firebaseReady) return;
      const updates = {};
      Object.keys(latestPlayers).forEach((id) => {
        updates[`rooms/${roomCode}/players/${id}/lives`] = maxLives;
        updates[`rooms/${roomCode}/players/${id}/xRatio`] = 0.5;
        updates[`rooms/${roomCode}/players/${id}/yRatio`] = 0.55;
      });
      await firebase.update(firebase.ref(db), updates);
      localPlayers.clear();
      syncLocalPlayers();
    }

    function writePlayerPositions(bounds, spriteSize) {
      const updates = {};
      for (const [id, state] of localPlayers) {
        const width = Math.max(1, bounds.width - spriteSize);
        const height = Math.max(1, bounds.height - spriteSize);
        updates[`rooms/${roomCode}/players/${id}/xRatio`] = state.x / width;
        updates[`rooms/${roomCode}/players/${id}/yRatio`] = state.y / height;
        updates[`rooms/${roomCode}/players/${id}/direction`] = state.direction;
      }
      if (Object.keys(updates).length > 0) {
        firebase.update(firebase.ref(db), updates);
      }
    }

    function renderHearts(container, lives) {
      container.replaceChildren();
      for (let i = 0; i < maxLives; i += 1) {
        const heart = document.createElement("img");
        heart.className = "heart";
        heart.alt = i < lives ? "빨간 하트" : "빈 하트";
        heart.src = i < lives ? heartFull : heartEmpty;
        container.append(heart);
      }
    }

    function selectFrame(direction, startedAt, now) {
      if (!direction) return idleFrame;
      const frames = walkFrames[direction] || [idleFrame];
      const index = Math.floor((now - startedAt) / frameDuration) % frames.length;
      return frames[index];
    }

    function getDirectionFromKeys(keys) {
      const up = Boolean(keys.w);
      const down = Boolean(keys.s);
      const left = Boolean(keys.a);
      const right = Boolean(keys.d);
      const vertical = up === down ? "" : up ? "w" : "s";
      const horizontal = left === right ? "" : left ? "a" : "d";
      return vertical + horizontal;
    }

    function movementVector(direction) {
      let x = 0;
      let y = 0;
      if (direction.includes("w")) y -= 1;
      if (direction.includes("s")) y += 1;
      if (direction.includes("a")) x -= 1;
      if (direction.includes("d")) x += 1;
      if (x !== 0 && y !== 0) {
        x *= Math.SQRT1_2;
        y *= Math.SQRT1_2;
      }
      return { x, y };
    }

    async function paintSprite(canvas, src, color) {
      const image = await loadImage(src);
      const context = canvas.getContext("2d");
      context.imageSmoothingEnabled = false;
      context.clearRect(0, 0, canvas.width, canvas.height);
      context.drawImage(image, 0, 0, canvas.width, canvas.height);

      const tint = hexToRgb(color);
      if (!tint) return;

      const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const alpha = data[i + 3];
        const isWhite = data[i] > 170 && data[i + 1] > 170 && data[i + 2] > 170;
        if (alpha > 20 && isWhite) {
          data[i] = tint.r;
          data[i + 1] = tint.g;
          data[i + 2] = tint.b;
        }
      }

      context.putImageData(imageData, 0, 0);
    }

    function loadImage(src) {
      if (imageCache.has(src)) return imageCache.get(src);

      const promise = new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });

      imageCache.set(src, promise);
      return promise;
    }

    function preloadImages() {
      const sources = new Set([idleFrame, heartFull, heartEmpty, ...Object.values(walkFrames).flat()]);
      sources.forEach((src) => loadImage(src));
    }

    function makePlayerUrl(code) {
      const url = new URL(location.href);
      url.search = "";
      url.searchParams.set("player", "1");
      url.searchParams.set("room", code);
      return url.toString();
    }

    function makeQrUrl(url) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=12&data=${encodeURIComponent(url)}`;
    }

    function makeRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for (let i = 0; i < 4; i += 1) {
        code += chars[Math.floor(Math.random() * chars.length)];
      }
      return code;
    }

    function normalizeRoom(value) {
      return String(value || "")
        .toUpperCase()
        .replace(/[^A-Z0-9]/g, "")
        .slice(0, 6);
    }

    function sanitizeNickname(value) {
      return String(value || "").trim().slice(0, 8);
    }

    function getPlayerId() {
      const key = "ganna-player-id";
      const saved = localStorage.getItem(key);
      if (saved) return saved;
      const id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
      localStorage.setItem(key, id);
      return id;
    }

    function makeEmptyKeys() {
      return { w: false, a: false, s: false, d: false };
    }

    function hexToRgb(hex) {
      const match = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      if (!match) return null;
      return {
        r: parseInt(match[1], 16),
        g: parseInt(match[2], 16),
        b: parseInt(match[3], 16)
      };
    }

    function getSpriteSize() {
      const value = getComputedStyle(document.documentElement).getPropertyValue("--sprite-size");
      const probe = document.createElement("div");
      probe.style.position = "absolute";
      probe.style.visibility = "hidden";
      probe.style.width = value;
      document.body.append(probe);
      const size = probe.getBoundingClientRect().width || 96;
      probe.remove();
      return size;
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }
  </script>
